services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ritzie
      POSTGRES_USER: ritzie
      POSTGRES_PASSWORD: ritzie
    volumes: 
      - pgdata:/var/lib/postgresql/data
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U ritzie"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "secure_redis_2024"]
    volumes: 
      - redisdata:/data

  gateway:
    build:
      context: .
      dockerfile: ./apps/gateway/Dockerfile
    env_file: 
      - .env
    environment:
      DATABASE_URL: postgres://ritzie:ritzie@postgres:5432/ritzie?sslmode=disable
      REDIS_URL: redis://:secure_redis_2024@redis:6379
      NODE_ENV: production
    depends_on: 
      - postgres
      - redis
    ports: 
      - "8082:8080"

volumes:
  pgdata:
  redisdata:
