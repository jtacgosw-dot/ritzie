services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ritzie
      POSTGRES_USER: ritzie
      POSTGRES_PASSWORD: ritzie_prod_password_change_me
    volumes: 
      - pgdata:/var/lib/postgresql/data
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U ritzie"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes: 
      - redisdata:/data
    restart: unless-stopped

  gateway:
    build: ./apps/gateway
    env_file: 
      - .env.prod
    environment:
      DATABASE_URL: postgres://ritzie:ritzie_prod_password_change_me@postgres:5432/ritzie
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on: 
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports: 
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  redisdata:
