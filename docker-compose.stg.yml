services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ritzie
      POSTGRES_USER: ritzie
      POSTGRES_PASSWORD: ritzie
    volumes: 
      - pgdata:/var/lib/postgresql/data
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U ritzie"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes: 
      - redisdata:/data

  gateway:
    build: ./apps/gateway
    env_file: 
      - .env
    environment:
      DATABASE_URL: postgres://ritzie:ritzie@postgres:5432/ritzie
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on: 
      - postgres
      - redis
    ports: 
      - "8080:8080"

volumes:
  pgdata:
  redisdata:
